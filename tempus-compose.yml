services:

  django:
    build: 
        context: ./Django
    ports:
      - "${DJANGO_PORT}:${DJANGO_PORT}"
    depends_on:
      - postgres
    volumes: 
      - static_volume:/app/static/
      - ./app/licenseimage
      - ./app/detectionimage
      
    
  postgres:
    build:
      context: ./DB
    expose:
    - "${POSTGRES_PORT}"
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - ./var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d/init.sql
      - ./etc/postgresql/postgresql.conf
    command: -p ${POSTGRES_PORT}
 #pgadmin-ct:
 #   image: dpage/pgadmin4:latest
  #  restart: always
   # environment:
    #  PGADMIN_DEFAULT_EMAIL: admin@blueocean.com.py
     # PGADMIN_DEFAULT_PASSWORD: pilsen12345
   # ports:
   #   - "5050:80"
   # depends_on: 
   #   - "postgres"

  web: 
    build: 
        context: ./Webhook
    ports:
      - "${WEBHOOK_PORT}:${WEBHOOK_PORT}"
    depends_on:
      - postgres
    volumes:
      - ./app/licenseimage
      - ./app/detectionimage

  nginx: 
    build: 
        context: ./Nginx
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/static/
      - ./app/licenseimage
      - ./app/detectionimage
    depends_on: 
      - django


volumes: 
  static_volume:
