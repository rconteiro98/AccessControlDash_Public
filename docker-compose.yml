services:
  postgres:
    build:
      context: ./DB
    ports:
      - "${POSTGRES_PORT:-5433}:${POSTGRES_PORT:-5433}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accesscontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-accesscontrol}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: ./Webhook
    ports:
      - "${WEBHOOK_PORT:-5000}:${WEBHOOK_PORT:-5000}"
    depends_on:
      - postgres
    environment:
      FLASK_PORT: ${WEBHOOK_PORT:-5000}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5433}
      DB_NAME: ${DB_NAME:-accesscontrol}
      DB_USER: ${DB_USER:-accesscontrol}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      BASE_URL_FM: ${BASE_URL_FM:-http://localhost/}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      MAX_CONTENT_LENGTH_MB: ${MAX_CONTENT_LENGTH_MB:-10}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-app.log}
      EMAIL_SENDER: ${EMAIL_SENDER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_RECIPIENTS: ${EMAIL_RECIPIENTS:-}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-}
      CHAT_ALERTAS_FM: ${CHAT_ALERTAS_FM:-}
      CHAT_PORTERIA_FM: ${CHAT_PORTERIA_FM:-}
      CHAT_OFICINA_FM: ${CHAT_OFICINA_FM:-}
      CHAT_GENERAL: ${CHAT_GENERAL:-}
    volumes:
      - license_images:/app/licenseimage
      - detection_images:/app/detectionimage
      - xml_payloads:/app/xmls

  nginx:
    build:
      context: ./Nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - web
    volumes:
      - license_images:/app/licenseimage:ro
      - detection_images:/app/detectionimage:ro

volumes:
  postgres_data:
  license_images:
  detection_images:
  xml_payloads:
