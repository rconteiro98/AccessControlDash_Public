events {
}

http {
    include /etc/nginx/mime.types;
    sendfile on;

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;

        location = / {
            return 404;
        }

        location /licenseimage/ {
            alias /app/licenseimage/;
            autoindex off;
            try_files $uri =404;
        }

        location /detectionimage/ {
            alias /app/detectionimage/;
            autoindex off;
            try_files $uri =404;
        }
    }
}
